version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rutick-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-rutick}
      POSTGRES_USER: ${DB_USER:-rutick_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rutick_password_change_me}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETFCAPS
    networks:
      - rutick-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rutick_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      args:
        - NODE_ENV=production
    container_name: rutick-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rutick}
      DB_USER: ${DB_USER:-rutick_user}
      DB_PASSWORD: ${DB_PASSWORD:-rutick_password_change_me}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@riarauniversity.ac.ke}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rutick-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /app/uploads
      - /var/tmp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  frontend:
    image: nginx:1.27-alpine
    container_name: rutick-frontend
    ports:
      - "80:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rutick-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx
      - /var/log/nginx
      - /var/tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./mongo_data
    ipam:
      config:
        - subnet: 172.20.0.0/16
